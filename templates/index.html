<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Pulse Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .pulse-icon { animation: pulse-animation 2s infinite; }
        @keyframes pulse-animation {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }
        .glass-effect { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-slate-900 min-h-screen font-sans">

    <nav class="bg-blue-800 p-4 text-white shadow-lg mb-8">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <i class="fas fa-satellite-dish text-2xl text-blue-300"></i>
                <h1 class="text-xl font-bold tracking-tight">CLOUD<span class="text-blue-300">PULSE</span></h1>
            </div>
            <div class="text-sm font-mono bg-blue-900 px-4 py-2 rounded border border-blue-700">
                NODE: {{ hostname }}
            </div>
        </div>
    </nav>

    <div class="max-w-6xl mx-auto px-4">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-1">
                <div class="glass-effect p-6 rounded-2xl shadow-2xl">
                    <h2 class="text-xl font-bold mb-6 flex items-center gap-2">
                        <i class="fas fa-plus-circle text-blue-600"></i> Deploy New Node
                    </h2>
                    <form action="/add" method="POST" class="space-y-4">
                        <input type="text" name="server_name" placeholder="Server Name" class="w-full border p-3 rounded-xl outline-none" required>
                        <input type="text" name="ip_address" placeholder="IP Address" class="w-full border p-3 rounded-xl outline-none" required>
                        <button type="submit" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl shadow-lg">INITIALIZE MONITOR</button>
                    </form>
                </div>
            </div>

            <div class="lg:col-span-2 text-slate-800">
                <div class="glass-effect rounded-2xl shadow-2xl overflow-hidden">
                    <table class="w-full text-left">
                        <thead class="bg-slate-50">
                            <tr>
                                <th class="p-4 text-xs font-bold uppercase">Resource</th>
                                <th class="p-4 text-xs font-bold uppercase">Network IP</th>
                                <th class="p-4 text-xs font-bold uppercase text-center">Status</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-slate-100 bg-white">
                            {% for r in resources %}
                            <tr>
                                <td class="p-4 font-bold">{{ r.server_name }}</td>
                                <td class="p-4 font-mono text-blue-600">{{ r.ip_address }}</td>
                                <td class="p-4">
                                    <div class="flex items-center justify-center gap-2">
                                        <div class="w-2 h-2 rounded-full {% if r.status == 'Healthy' %}bg-green-500 pulse-icon{% else %}bg-red-500{% endif %}"></div>
                                        <span class="text-xs font-bold uppercase {% if r.status == 'Healthy' %}text-green-600{% else %}text-red-600{% endif %}">{{ r.status }}</span>
                                    </div>
                                </td>
                            </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
